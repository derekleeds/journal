name: Build and Deploy Jekyll to Cloudflare Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build --destination _site

      - name: Copy Markdown source files for AI agents
        run: |
          echo "Copying Markdown files to site output..."
          
          # Copy posts (strip date prefix from filename)
          find _posts \( -name "*.md" -o -name "*.markdown" \) | while read file; do
            filename=$(basename "$file")
            if [[ $filename =~ ^([0-9]{4})-([0-9]{2})-([0-9]{2})-(.+)\.(md|markdown)$ ]]; then
              slug="${BASH_REMATCH[4]}"
              cp "$file" "_site/${slug}.md"
              echo "Copied: $file -> _site/${slug}.md"
            fi
          done
          
          # Copy pages (preserve name)
          if [ -d "_pages" ]; then
            find _pages \( -name "*.md" -o -name "*.markdown" \) | while read file; do
              filename=$(basename "$file" .md)
              if [[ "$filename" != "index" ]]; then
                cp "$file" "_site/${filename}.md"
                echo "Copied page: $file -> _site/${filename}.md"
              fi
            done
          fi
          
          echo "Markdown copying complete!"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: journal-derekleeds
          directory: _site
          branch: main
          # Optional: Enable automatic GitHub deployment status updates
          wranglerVersion: '3'
