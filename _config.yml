# Jekyll configuration for OpenClaw Journal
# Deploy to Cloudflare Pages

title: OpenClaw Journal
description: Homelab adventures, AI agents, and learning by doing.
author: Derek Leeds
email: contact@derekleeds.com

# Site URL
url: "https://journal-3tx.pages.dev"
baseurl: ""

# Timezone
timezone: America/Chicago

# Build settings
markdown: kramdown
highlighter: rouge

# Theme - simple and built-in
theme: minima

# Permalinks - clean URLs
permalink: /:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - LICENSE
  - migrate-posts.sh

# Blog settings
show_excerpts: true

# Social
github_username: derekleeds

# Navigation header links
header_pages:
  - about.md

# Minima theme settings
minima:
  skin: dark
  social_links:
    github: derekleeds