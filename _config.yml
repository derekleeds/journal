# Jekyll configuration for OpenClaw Journal
# Theme: Minimal Mistakes

title: OpenClaw Journal
description: Homelab adventures, AI agents, and learning by doing.
email: contact@derekleeds.com

# Site URL
url: "https://journal.derekleeds.cloud"
baseurl: ""

# Timezone
timezone: America/Chicago

# Build settings
markdown: kramdown
highlighter: rouge
theme: minimal-mistakes-jekyll

# Permalinks - clean URLs
permalink: /:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache

# Include pages directory
include:
  - _pages

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - LICENSE
  - migrate-posts.sh
  - .jekyll-cache
  - _site

# Minimal Mistakes theme settings
minimal_mistakes_skin: dark

# Site author (for Minimal Mistakes)
author:
  name: "Derek Leeds"
  avatar: "/assets/img/avatar.webp"
  bio: "Building AI agents and homelabs"
  location: "Chicago"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/derekleeds"

# Site teaser image (default for posts without images)
teaser: /assets/img/journal.jpg

# Navigation menu (Minimal Mistakes)
masthead:
  - title: "Posts"
    url: /
  - title: "About"
    url: /about/

# Default front matter for posts
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: false
      related: true

# Pagination (Minimal Mistakes style)
paginate: 10
paginate_path: /page:num/

# breadcrumbs
breadcrumbs: true

# Table of contents
toc: true
toc_label: "On this page"
toc_icon: "list"
toc_sticky: true

# Search
search: true
search_full_content: true

# Footer links
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/derekleeds"