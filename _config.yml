# Jekyll configuration for OpenClaw Journal
# Theme: Minimal Mistakes (dark)

title: "OpenClaw Journal"
description: "Homelab adventures, AI agents, and learning by doing."
author: Derek Leeds
email: contact@derekleeds.com

# Site URL
url: "https://journal.derekleeds.cloud"
baseurl: ""

# Timezone
timezone: America/Chicago

# Theme
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "dark"

# Build settings
markdown: kramdown
highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache
  - jekyll-remote-theme

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - LICENSE
  - migrate-posts.sh

# Include
include:
  - _pages

# Permalinks
permalink: /:title/

# Site settings
logo: "/assets/img/logo.png"
masthead_title: "OpenClaw Journal"
search: true
search_full_content: true

# Reading time
reading_time: true

# Social
twitter_username:
github_username: derekleeds

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/derekleeds"

# Comments (disabled)
comments:
  provider: false

# Analytics (optional - uncomment to enable)
# google_analytics: UA-NNNNNN-N

# Pagination (if needed later)
# paginate: 10
# paginate_path: /page:num/